<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthLink AI - Medication Reminders</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>💊 HealthLink AI</h1>
            <p class="subtitle">Medication Reminder System</p>
        </header>

        <main>
            <!-- Add Reminder Form -->
            <div class="form-container">
                <h2>Add New Reminder</h2>
                <form id="reminderForm" onsubmit="addMedicine(event)">
                    <div class="form-group">
                        <label for="medicine">Medicine Name</label>
                        <input 
                            type="text" 
                            id="medicine" 
                            placeholder="e.g., Paracetamol, Aspirin"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="dosage">Dosage</label>
                        <input 
                            type="text" 
                            id="dosage" 
                            placeholder="e.g., 500mg, 1 tablet"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="frequency">Frequency</label>
                        <select id="frequency" required>
                            <option value="">Select frequency</option>
                            <option value="once">Once a day</option>
                            <option value="twice">Twice a day</option>
                            <option value="thrice">Three times a day</option>
                            <option value="custom">Custom hours</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="time">First Reminder Time</label>
                        <input 
                            type="time" 
                            id="time"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="notes">Notes (Optional)</label>
                        <textarea 
                            id="notes" 
                            placeholder="e.g., Take with food, before bed"
                            rows="3"
                        ></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Add Reminder
                    </button>
                </form>
            </div>

            <!-- Reminders List -->
            <div class="reminders-container">
                <h2>Your Reminders</h2>
                <div id="emptyState" class="empty-state">
                    <i class="fas fa-inbox"></i>
                    <p>No reminders yet. Add one to get started!</p>
                </div>
                <ul id="list" class="reminders-list"></ul>
            </div>

            <!-- Statistics -->
            <div class="stats-container">
                <div class="stat">
                    <i class="fas fa-check-circle"></i>
                    <div>
                        <h3 id="totalReminders">0</h3>
                        <p>Total Reminders</p>
                    </div>
                </div>
                <div class="stat">
                    <i class="fas fa-bell"></i>
                    <div>
                        <h3 id="todayReminders">0</h3>
                        <p>Today's Reminders</p>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 HealthLink AI Zimbabwe. Improving healthcare access.</p>
            <button onclick="exportReminders()" class="btn btn-secondary">
                <i class="fas fa-download"></i> Export Data
            </button>
            <button onclick="clearAllReminders()" class="btn btn-danger">
                <i class="fas fa-trash"></i> Clear All
            </button>
        </footer>
    </div>

    <!-- Modal for editing -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Edit Reminder</h2>
            <form id="editForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label for="editMedicine">Medicine Name</label>
                    <input type="text" id="editMedicine" required>
                </div>
                <div class="form-group">
                    <label for="editDosage">Dosage</label>
                    <input type="text" id="editDosage" required>
                </div>
                <div class="form-group">
                    <label for="editTime">Time</label>
                    <input type="time" id="editTime" required>
                </div>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </form>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>
</html>
